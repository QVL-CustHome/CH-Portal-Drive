# CI/CD CH-Portal-Drive — base commune : template node QVL-ToolBox/PipeLine
include:
  - remote: "https://raw.githubusercontent.com/QVL-ToolBox/PipeLine/main/node.gitlab-ci.yml"

stages:
  - test
  - build
  - deploy

# ce repo n'a pas (encore) prettier -> lint = eslint seul
lint:
  script:
    - npm ci
    - npm run lint

# la config de prod est injectee UNIQUEMENT au build (les tests gardent les valeurs par defaut)
build:
  variables:
    VITE_AUTH_PORTAL_URL: "https://ch-auth.qvl-project.com"
  script:
    - npm ci
    - npm run build
  artifacts:
    paths: [dist/]
    expire_in: 1 week

deploy:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  dependencies: [build]
  script:
    - sudo /usr/local/bin/ch-deploy-portal ch-portal-drive "$CI_PROJECT_DIR"

# ce portail n'a pas encore de tests unitaires -> vitest ne doit pas echouer sur suite vide
test:
  script:
    - npm ci
    - npm test -- --passWithNoTests
